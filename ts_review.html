<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTable Trust & Safety Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #FAFAF8; color: #1A1A1A; min-height: 100vh; }

  /* ── colors ── */
  :root {
    --wine: #8D1B3D; --wine-light: #FCEBEB; --wine-dark: #5C0F26;
    --olive: #75815C; --olive-light: #EAF3DE;
    --khaki: #D2BCA1; --khaki-light: #F5EFE6;
    --purple: #9BA2FF;
    --amber: #FAC775; --amber-dark: #633806;
    --green: #0F6E56; --green-light: #E1F5EE;
    --text: #1A1A1A; --text-sec: #666; --text-ter: #999;
    --border: #E8E2D9; --bg: #FAFAF8; --card: #fff;
  }

  /* ── header ── */
  .header { background: var(--wine); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-brand { color: #fff; font-weight: 600; font-size: 16px; }
  .header-sub { color: rgba(255,255,255,0.6); font-size: 14px; }
  .header-tabs { display: flex; gap: 4px; }
  .tab-btn { padding: 5px 12px; border-radius: 6px; border: none; background: transparent; color: #fff; font-size: 13px; cursor: pointer; }
  .tab-btn.active { background: rgba(255,255,255,0.2); font-weight: 600; }

  /* ── layout ── */
  .main { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

  /* ── summary bar ── */
  .summary-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
  .summary-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .summary-num { font-size: 22px; font-weight: 500; }
  .summary-label { font-size: 12px; color: var(--text-sec); margin-top: 2px; }

  /* ── filter bar ── */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { font-size: 13px; padding: 5px 12px; border-radius: 6px; border: 0.5px solid var(--border); background: transparent; color: var(--text-sec); cursor: pointer; }
  .filter-btn.active { border-color: var(--wine); background: var(--wine-light); color: var(--wine); }

  /* ── run info ── */
  .run-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .run-meta { font-size: 12px; color: var(--text-sec); }

  /* ── case card ── */
  .case-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .case-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
  .case-header:hover { background: var(--khaki-light); }
  .case-header.open { background: var(--khaki-light); }
  .score-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 15px; flex-shrink: 0; }
  .case-meta { flex: 1; min-width: 0; }
  .case-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
  .case-name { font-weight: 500; font-size: 15px; color: var(--text); text-decoration: underline; text-underline-offset: 3px; }
  .case-name:hover { color: var(--wine); }
  .case-stats { font-size: 12px; color: var(--text-sec); display: flex; gap: 6px; flex-wrap: wrap; }
  .case-summary { font-size: 13px; color: var(--text-sec); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chevron { font-size: 16px; color: var(--text-sec); transition: transform 0.2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }

  /* ── case body ── */
  .case-body { padding: 0 16px 16px; border-top: 0.5px solid var(--border); }
  .section-label { font-size: 11px; font-weight: 500; color: var(--text-ter); text-transform: uppercase; letter-spacing: 0.05em; margin: 14px 0 6px; }
  .bullets { margin: 10px 0 0; padding-left: 16px; }
  .bullets li { font-size: 13px; color: var(--text); margin-bottom: 5px; line-height: 1.5; }

  /* ── signals ── */
  .signals { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .signal-pill { padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; position: relative; }
  .signal-pill.triggered { background: var(--wine-light); color: var(--wine); }
  .signal-pill.not-triggered { background: #F0F0EE; color: var(--text-ter); }

  /* ── score breakdown ── */
  .breakdown { margin-top: 4px; }
  .breakdown-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .breakdown-row.dimmed { opacity: 0.4; }
  .breakdown-contrib { color: var(--wine); font-weight: 500; }
  .breakdown-total { display: flex; justify-content: space-between; padding: 6px 0 2px; font-weight: 600; font-size: 14px; }

  /* ── collapsible ── */
  .collapsible { border: 0.5px solid var(--border); border-radius: 8px; margin-top: 12px; overflow: hidden; }
  .collapsible-header { padding: 10px 12px; display: flex; justify-content: space-between; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text); }
  .collapsible-header:hover { background: var(--khaki-light); }
  .collapsible-body { padding: 10px 12px; border-top: 0.5px solid var(--border); display: none; }
  .collapsible-body.open { display: block; }

  /* ── host context ── */
  .context-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
  .profile-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .profile-label { color: var(--text-sec); }
  .profile-val { font-weight: 500; color: var(--text); text-align: right; }

  /* ── cluster table ── */
  .cluster-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  .cluster-table th { text-align: left; font-weight: 500; color: var(--text-sec); padding: 6px 8px; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  .cluster-table td { padding: 8px; border-bottom: 0.5px solid var(--border); vertical-align: top; }
  .cluster-banner { background: #FAEEDA; border-left: 3px solid #BA7517; padding: 8px 12px; font-size: 13px; color: var(--amber-dark); border-radius: 0 6px 6px 0; margin: 12px 0 4px; }

  /* ── badges ── */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; }
  .badge.suspension { background: var(--wine-light); color: var(--wine); }
  .badge.nourishment_pause { background: #FAEEDA; color: var(--amber-dark); }
  .badge.warning { background: var(--olive-light); color: #27500A; }
  .badge.dismiss { background: #F0F0EE; color: var(--text-sec); }
  .badge.program_team { background: var(--green-light); color: var(--green); }
  .badge.actioned { background: var(--olive-light); color: var(--green); font-size: 11px; padding: 2px 8px; }
  .badge.urgent { background: var(--wine-light); color: var(--wine); }
  .badge.flag-confirm { background: var(--amber); color: var(--amber-dark); }
  .badge.flag-program { background: var(--green-light); color: var(--green); }
  .dot { color: var(--border); }

  /* ── action checklist ── */
  .action-box { margin-top: 10px; padding: 10px 12px; border-radius: 8px; }
  .action-box.ts { background: var(--wine-light); }
  .action-box.dismiss-box { background: #F0F0EE; }
  .action-box.program { background: var(--green-light); }
  .action-title { font-weight: 500; font-size: 13px; margin-bottom: 6px; }
  .action-host { font-weight: 500; font-size: 12px; color: var(--text); margin-bottom: 2px; margin-top: 8px; }
  .action-item { font-size: 12px; padding-left: 12px; margin-bottom: 2px; }
  .action-item.ready { color: var(--green); }
  .action-item.pending { color: #854F0B; }

  /* ── notes ── */
  .notes-textarea { width: 100%; padding: 8px 10px; border-radius: 6px; border: 0.5px solid var(--border); font-size: 13px; min-height: 72px; resize: vertical; font-family: inherit; color: var(--text); background: var(--card); }
  .notes-textarea:focus { outline: none; border-color: var(--wine); }

  /* ── card footer ── */
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 12px; border-top: 0.5px solid var(--border); flex-wrap: wrap; gap: 8px; }
  .footer-left { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── buttons ── */
  .btn { padding: 6px 16px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn-primary { background: var(--wine); color: #fff; }
  .btn-primary:disabled { background: var(--border); color: var(--text-sec); cursor: default; }
  .btn-secondary { background: transparent; border: 0.5px solid var(--border); color: var(--text-sec); }
  .btn-discuss { padding: 6px 14px; border-radius: 6px; border: 0.5px solid var(--border); background: transparent; font-size: 13px; cursor: pointer; color: var(--text-sec); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-amber { background: var(--amber); color: var(--amber-dark); }

  /* ── override panel ── */
  .override-panel { margin-top: 12px; padding: 12px; background: var(--khaki-light); border-radius: 8px; border: 0.5px solid var(--border); }
  .override-panel select, .override-panel textarea { width: 100%; padding: 6px 10px; border-radius: 6px; border: 0.5px solid var(--border); font-size: 13px; margin-bottom: 8px; font-family: inherit; }
  .override-panel label { font-size: 13px; color: var(--text-sec); margin-bottom: 6px; display: block; }

  /* ── cluster warning ── */
  .cluster-warning { margin-top: 12px; padding: 10px 12px; background: #FAEEDA; border-radius: 8px; font-size: 13px; color: var(--amber-dark); }

  /* ── flag card ── */
  .flag-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .flag-icon.program { background: var(--green-light); color: var(--green); }
  .flag-icon.confirm { background: #FAEEDA; color: var(--amber-dark); }
  .similarity-bar-wrap { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .similarity-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .similarity-bar-fill { height: 100%; background: var(--green); border-radius: 2px; }
  .flag-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .flag-chip { padding: 4px 10px; border-radius: 6px; font-size: 12px; }
  .flag-chip.yes { background: var(--green-light); color: var(--green); }
  .flag-chip.no { background: var(--wine-light); color: var(--wine); }
  .flag-chip.neutral { background: #F0F0EE; color: var(--text-sec); }

  /* ── flag dinner table ── */
  .flag-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  .flag-table th { text-align: left; font-weight: 500; color: var(--text-sec); padding: 6px 8px; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  .flag-table td { padding: 8px; border-bottom: 0.5px solid var(--border); vertical-align: top; }

  /* ── insights ── */
  .insights-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 12px; }
  .insights-table th { text-align: left; padding: 6px 8px; border-bottom: 0.5px solid var(--border); font-weight: 500; color: var(--text-sec); font-size: 12px; }
  .insights-table td { padding: 6px 8px; }

  /* ── slack section ── */
  .slack-box { margin-top: 16px; padding: 16px; background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; }
  .slack-locked { padding: 16px; background: var(--khaki-light); border-radius: 8px; text-align: center; font-size: 13px; color: var(--text-sec); margin-top: 16px; }
  .slack-draft { width: 100%; min-height: 140px; padding: 10px 12px; border-radius: 8px; border: 0.5px solid var(--border); font-size: 13px; font-family: monospace; resize: vertical; margin-bottom: 10px; }

  /* ── load panel ── */
  .load-panel { max-width: 600px; margin: 48px auto; padding: 0 16px; text-align: center; }
  .load-icon { font-size: 32px; margin-bottom: 12px; }
  .load-title { font-weight: 600; font-size: 18px; margin-bottom: 8px; }
  .load-sub { font-size: 14px; color: var(--text-sec); margin-bottom: 24px; }
  .load-status { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
  .load-status.success { background: var(--green-light); color: var(--green); }
  .load-status.error { background: var(--wine-light); color: var(--wine); }

  /* ── chat panel ── */
  .chat-panel { position: fixed; bottom: 0; right: 0; width: 400px; height: 60vh; background: var(--card); border: 1px solid var(--border); border-radius: 12px 12px 0 0; box-shadow: 0 -4px 24px rgba(0,0,0,0.12); display: flex; flex-direction: column; z-index: 1000; }
  .chat-header { padding: 12px 16px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--wine); border-radius: 12px 12px 0 0; }
  .chat-header-name { font-weight: 600; font-size: 14px; color: #fff; }
  .chat-header-sub { font-size: 12px; color: rgba(255,255,255,0.7); }
  .chat-close { background: transparent; border: none; color: #fff; font-size: 20px; cursor: pointer; line-height: 1; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .chat-msg { display: flex; }
  .chat-msg.user { justify-content: flex-end; }
  .chat-bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
  .chat-bubble.user { background: var(--wine); color: #fff; border-radius: 12px 12px 2px 12px; }
  .chat-bubble.assistant { background: var(--khaki-light); color: var(--text); border-radius: 12px 12px 12px 2px; }
  .chat-bubble.thinking { color: var(--text-sec); }
  .chat-quick { padding: 6px 16px; display: flex; gap: 6px; flex-wrap: wrap; border-top: 0.5px solid var(--border); }
  .chat-quick-btn { font-size: 11px; padding: 3px 8px; border-radius: 10px; border: 0.5px solid var(--border); background: transparent; cursor: pointer; color: var(--text-sec); }
  .chat-quick-btn:hover { background: var(--khaki-light); }
  .chat-input-row { padding: 8px 12px; border-top: 0.5px solid var(--border); display: flex; gap: 8px; }
  .chat-input { flex: 1; padding: 8px 10px; border-radius: 8px; border: 0.5px solid var(--border); font-size: 13px; outline: none; font-family: inherit; }
  .chat-input:focus { border-color: var(--wine); }
  .chat-send { padding: 8px 14px; border-radius: 8px; border: none; background: var(--wine); color: #fff; font-size: 13px; cursor: pointer; }
  .chat-send:disabled { background: var(--border); cursor: default; }

  /* ── history ── */
  .history-item { padding: 12px 16px; background: var(--card); border: 0.5px solid var(--border); border-radius: 8px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .history-item:hover { background: var(--khaki-light); }

  /* ── empty states ── */
  .empty { text-align: center; padding: 64px 24px; color: var(--text-sec); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  /* ── misc ── */
  .sep { color: var(--border); }
  a { color: inherit; }
  .purple-link { color: var(--purple); text-decoration: none; }
  .purple-link:hover { text-decoration: underline; }
  .error-box { padding: 10px 14px; background: var(--wine-light); border-radius: 8px; color: var(--wine); font-size: 13px; margin-bottom: 16px; }
  .section-divider { font-size: 11px; font-weight: 500; color: var(--text-ter); text-transform: uppercase; letter-spacing: 0.05em; margin: 24px 0 10px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── state ──────────────────────────────────────────────────────────────────
const state = {
  view: 'load',   // load | review | history
  runs: [],
  current: null,
  filter: 'all',
  actionState: {},   // id -> {tier, reason, note}
  activeChat: null,  // case object
  overrideOpen: null,
  clusterWarning: null,
};

// ── storage ────────────────────────────────────────────────────────────────
const STORE_KEY = 'ts-weekly-runs';
function loadRuns() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
  catch { return []; }
}
function saveRuns(runs) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(runs)); } catch {}
}

// ── init ───────────────────────────────────────────────────────────────────
state.runs = loadRuns();

// ── helpers ────────────────────────────────────────────────────────────────
function tierLabel(tier) {
  return {suspension:'Suspension', nourishment_pause:'Nourishment Pause', warning:'Warning', dismiss:'Dismissed · No misuse', program_team:'Referred to program team'}[tier] || tier;
}
function tierClass(tier) {
  return {suspension:'suspension', nourishment_pause:'nourishment_pause', warning:'warning', dismiss:'dismiss', program_team:'program_team'}[tier] || 'warning';
}
function scoreColor(tier) {
  return {suspension:'var(--wine)', nourishment_pause:'var(--amber-dark)', warning:'var(--olive)'}[tier] || 'var(--text-sec)';
}
function scoreBg(tier) {
  return {suspension:'var(--wine-light)', nourishment_pause:'#FAEEDA', warning:'var(--olive-light)'}[tier] || '#F0F0EE';
}
function md(text) {
  if (!text) return '';
  return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
}
function runDate() {
  return state.current?.run?.run_date || state.current?.run?.week_of || '';
}

// ── load from file ─────────────────────────────────────────────────────────
async function tryLoadFromFile() {
  // Try to fetch ts_ui_data.json from same directory
  try {
    const res = await fetch('./ts_ui_data.json');
    if (!res.ok) return null;
    const data = await res.json();
    return data;
  } catch { return null; }
}

// ── render engine ──────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp();
  attachEvents();
}

function buildApp() {
  return `
    ${buildHeader()}
    <div class="main">
      ${state.view === 'load' ? buildLoadView() : ''}
      ${state.view === 'review' ? buildReviewView() : ''}
      ${state.view === 'history' ? buildHistoryView() : ''}
    </div>
    ${state.activeChat ? buildChatPanel() : ''}
  `;
}

// ── header ─────────────────────────────────────────────────────────────────
function buildHeader() {
  return `
    <div class="header">
      <div class="header-left">
        <span class="header-brand">OneTable</span>
        <span class="header-sub">Trust & Safety</span>
      </div>
      <div class="header-tabs">
        ${['load','review','history'].map(v => `
          <button class="tab-btn ${state.view===v?'active':''}" onclick="switchView('${v}')">
            ${v==='load'?'Load Run':v==='review'?'Current Run':'History'}
          </button>`).join('')}
      </div>
    </div>`;
}

// ── load view ─────────────────────────────────────────────────────────────
function buildLoadView() {
  return `
    <div class="load-panel">
      <div class="load-icon">📋</div>
      <div class="load-title">Load Weekly Run</div>
      <div class="load-sub">
        The review UI automatically loads <code>ts_ui_data.json</code> from the same folder.<br>
        After Claude Code runs the review, click Refresh below.
      </div>
      <div style="display:flex;gap:10px;justify-content:center;margin-bottom:16px;">
        <button class="btn btn-primary" onclick="autoLoad()">↻ Refresh from file</button>
        <label class="btn btn-secondary" style="cursor:pointer;">
          Or upload JSON
          <input type="file" accept=".json" style="display:none" onchange="handleFileUpload(event)">
        </label>
      </div>
      <div id="load-status"></div>
      ${state.runs.length > 0 ? `
        <div style="margin-top:24px;font-size:13px;color:var(--text-sec);">
          Or <a href="#" onclick="switchView('history');return false;" style="color:var(--wine);">view a previous run</a> from history.
        </div>` : ''}
    </div>`;
}

// ── review view ───────────────────────────────────────────────────────────
function buildReviewView() {
  if (!state.current) return `
    <div class="empty">
      <div class="empty-icon">📭</div>
      <div style="font-size:16px;margin-bottom:8px;">No run loaded</div>
      <button class="btn btn-primary" onclick="switchView('load')">Load a run</button>
    </div>`;

  const cases = state.current.cases || [];
  const flags = state.current.cross_host_flags || [];
  const allActioned = cases.length > 0 && cases.every(c => state.actionState[c.id]) && flags.every(f => state.actionState[f.id]);

  const filtered = cases.filter(c => {
    if (state.filter === 'all') return true;
    if (state.filter === 'cluster') return c.is_cluster;
    return c.tier === state.filter;
  }).sort((a,b) => {
    if (a.is_cluster && !b.is_cluster) return -1;
    if (!a.is_cluster && b.is_cluster) return 1;
    return b.score - a.score;
  });

  const s = state.current.run?.summary || {};
  return `
    <div class="summary-bar">
      <div class="summary-card"><div class="summary-num" style="color:var(--wine)">${s.suspension||0}</div><div class="summary-label">Suspension</div></div>
      <div class="summary-card"><div class="summary-num" style="color:var(--amber-dark)">${s.nourishment_pause||0}</div><div class="summary-label">Nourishment Pause</div></div>
      <div class="summary-card"><div class="summary-num" style="color:var(--olive)">${s.warning||0}</div><div class="summary-label">Warning</div></div>
      <div class="summary-card"><div class="summary-num" style="color:var(--text-sec)">${state.current.run?.dinners_reviewed||0}</div><div class="summary-label">Dinners reviewed</div></div>
    </div>
    <div class="run-info">
      <div class="run-meta">Week of ${state.current.run?.week_of} · Run date: ${runDate()} · Agent v5.2</div>
      <button class="btn btn-secondary" onclick="switchView('load')" style="font-size:12px;padding:4px 10px;">+ Load new run</button>
    </div>
    <div class="filter-bar">
      ${[['all','All'],['cluster','⚠ Cluster'],['suspension','Suspension'],['nourishment_pause','Nourishment Pause'],['warning','Warning']].map(([f,l]) =>
        `<button class="filter-btn ${state.filter===f?'active':''}" onclick="setFilter('${f}')">${l}</button>`).join('')}
    </div>
    ${filtered.length === 0 ? '<div style="font-size:14px;color:var(--text-sec);margin-bottom:16px;">No cases match this filter.</div>' : filtered.map(c => buildCaseCard(c)).join('')}
    ${flags.length > 0 ? `<div class="section-divider">Cross-host flags — program team</div>${flags.map(f => buildFlagCard(f)).join('')}` : ''}
    ${buildInsights()}
    ${buildSlack(allActioned)}
  `;
}

// ── case card ─────────────────────────────────────────────────────────────
function buildCaseCard(c) {
  const a = state.actionState[c.id] || {};
  const actioned = !!a.tier;
  const displayTier = a.tier || c.tier;
  const isOpen = state.openCards?.has(c.id);
  const overrideOpen = state.overrideOpen === c.id;
  const clusterWarn = state.clusterWarning === c.id;

  return `
    <div class="case-card" id="card-${c.id}">
      <div class="case-header ${isOpen?'open':''}" onclick="toggleCard('${c.id}')">
        <div class="score-circle" style="background:${scoreBg(c.tier)};color:${scoreColor(c.tier)}">${c.score}</div>
        <div class="case-meta">
          <div class="case-name-row">
            <a class="case-name" href="${c.sf_url}" target="_blank" onclick="event.stopPropagation()">${c.name} ↗</a>
            <span class="badge ${tierClass(displayTier)}">${c.is_cluster?'⚠ Cluster · ':''}${tierLabel(displayTier)}</span>
            ${actioned ? '<span class="badge actioned">✓ Actioned</span>' : ''}
          </div>
          <div class="case-stats">
            <span>Score ${c.score}</span><span class="sep">·</span>
            <span>${c.nourishment_received}</span><span class="sep">·</span>
            <span>${c.future_dinners} future dinners</span>
            ${c.suspended ? '<span class="sep">·</span><span style="color:var(--wine);font-weight:500">active suspension</span>' : ''}
            ${c.dnn && !c.suspended ? '<span class="sep">·</span><span style="color:var(--amber-dark);font-weight:500">DNN</span>' : ''}
          </div>
          <div class="case-summary">${c.collapsed_summary||''}</div>
        </div>
        <span class="chevron ${isOpen?'open':''}">▾</span>
      </div>
      ${isOpen ? buildCaseBody(c, a, actioned, displayTier, overrideOpen, clusterWarn) : ''}
    </div>`;
}

function buildCaseBody(c, a, actioned, displayTier, overrideOpen, clusterWarn) {
  const hosts = c.is_cluster && c.cluster_hosts?.length ? c.cluster_hosts.map(h=>h.name) : [c.name];
  return `
    <div class="case-body">
      ${c.is_cluster && c.cluster_note ? `<div class="cluster-banner">🔗 ${c.cluster_note}</div>` : ''}
      ${c.is_cluster && c.cluster_hosts?.length ? `
        <div class="section-label">Hosts</div>
        <table class="cluster-table">
          <thead><tr><th>Host</th><th>Score</th><th>Nourishment</th><th>Address</th><th>Key signals</th></tr></thead>
          <tbody>${c.cluster_hosts.map(h=>`
            <tr>
              <td><a class="purple-link" href="${h.sf_url}" target="_blank">${h.name}</a></td>
              <td>${h.score}</td>
              <td>${h.nourishment_received}</td>
              <td style="font-size:12px;color:var(--text-sec)">${h.address||'—'}</td>
              <td style="font-size:12px;color:var(--text-sec)">${h.key_signals||''}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : ''}

      <div class="section-label">Summary</div>
      <ul class="bullets">${(c.bullets||[]).map(b=>`<li>${md(b)}</li>`).join('')}</ul>

      <div class="section-label">Signals</div>
      <div class="signals">${(c.signals||[]).map(s=>`
        <span class="signal-pill ${s.triggered?'triggered':'not-triggered'}" title="${s.triggered?s.observed||'':'Not triggered: '+s.threshold}">${s.name}</span>`).join('')}</div>

      ${c.score_breakdown ? `
        <div class="collapsible">
          <div class="collapsible-header" onclick="toggleCollapsible(this)">Score breakdown <span class="chevron">▾</span></div>
          <div class="collapsible-body">
            <div class="breakdown">
              ${(c.signals||[]).filter(s=>s.triggered&&s.score_contribution>0).sort((a,b)=>b.score_contribution-a.score_contribution).map(s=>`
                <div class="breakdown-row">
                  <span style="color:var(--text-sec)">${s.name} <span style="font-size:12px;color:var(--text-ter)">${s.observed||''}</span></span>
                  <span class="breakdown-contrib">+${s.score_contribution}</span>
                </div>`).join('')}
              ${(c.signals||[]).filter(s=>!s.triggered).map(s=>`
                <div class="breakdown-row dimmed">
                  <span style="color:var(--text-ter)">${s.name} — ${s.observed||s.threshold||'not triggered'}</span>
                  <span style="color:var(--text-ter)">+0</span>
                </div>`).join('')}
              <div class="breakdown-total"><span>Total</span><span style="color:var(--wine)">${c.score}</span></div>
            </div>
          </div>
        </div>` : ''}

      ${c.host_context ? `
        <div class="collapsible">
          <div class="collapsible-header" onclick="toggleCollapsible(this)">Host Context Profile <span class="chevron">▾</span></div>
          <div class="collapsible-body">
            <div class="context-grid">
              <div>${[['Tenure',c.host_context.tenure],['Dinners hosted',c.host_context.dinners_hosted],['Nourishment received',c.host_context.nourishment_received],['Future dinners',c.host_context.future_dinners],['DNN',c.host_context.dnn]].map(([l,v])=>`
                <div class="profile-row"><span class="profile-label">${l}</span><span class="profile-val">${v||'—'}</span></div>`).join('')}</div>
              <div>${[['Benchmark call',c.host_context.benchmark_call],['Prior T&S cases',c.host_context.prior_ts_cases],['Suspended',c.host_context.suspended],['Graduated host',c.host_context.graduated_host],['New host',c.host_context.new_host]].map(([l,v])=>`
                <div class="profile-row"><span class="profile-label">${l}</span><span class="profile-val">${v||'—'}</span></div>`).join('')}</div>
            </div>
          </div>
        </div>` : ''}

      ${clusterWarn ? `
        <div class="cluster-warning">
          ⚠ This is a cluster case. Consult Amalia before proceeding.
          <div style="margin-top:8px;display:flex;gap:8px;">
            <button class="btn btn-primary" style="font-size:12px;padding:5px 12px;" onclick="confirmCluster('${c.id}')">Confirmed, proceed</button>
            <button class="btn btn-secondary" style="font-size:12px;padding:5px 12px;" onclick="cancelCluster()">Cancel</button>
          </div>
        </div>` : ''}

      ${actioned ? buildActionChecklist(displayTier, hosts, runDate(), 'ts', a.note) : ''}

      <div style="margin-top:14px;">
        <div class="section-label">Internal notes</div>
        <textarea class="notes-textarea" placeholder="Add notes for this case -- context, agreements, decisions. Saved with this run and added to Salesforce case on approval."
          oninput="saveNote('${c.id}', this.value)">${a.note||''}</textarea>
      </div>

      ${overrideOpen ? `
        <div class="override-panel">
          <label>Select action</label>
          <select id="override-tier-${c.id}">
            <option value="">-- select --</option>
            <optgroup label="Override tier">
              <option value="warning">Warning (1-8)</option>
              <option value="nourishment_pause">Nourishment Pause (9-17)</option>
              <option value="suspension">Suspension (18-39)</option>
              <option value="deactivation">Deactivation (40+)</option>
            </optgroup>
            <optgroup label="Close without consequence">
              <option value="dismiss">Dismiss -- no misuse</option>
              <option value="program_team">Refer to program team</option>
            </optgroup>
          </select>
          <label>Reason</label>
          <textarea id="override-reason-${c.id}" placeholder="Explain why..." style="min-height:60px;resize:vertical;"></textarea>
          <button class="btn" style="background:var(--amber-dark);color:#fff;font-size:13px;" onclick="confirmOverride('${c.id}')">Confirm</button>
        </div>` : ''}

      <div class="card-footer">
        <div class="footer-left">
          <button class="btn btn-primary" ${actioned?'disabled':''} onclick="approveCase('${c.id}','${c.tier}',${c.is_cluster})">
            ${actioned ? '✓ Approved' : 'Approve recommendation'}
          </button>
          ${!actioned ? `<button class="btn btn-secondary" onclick="toggleOverride('${c.id}')">${overrideOpen?'Cancel':'Override / dismiss'}</button>` : ''}
        </div>
        <button class="btn-discuss" onclick="openChat(${JSON.stringify(c).replace(/'/g,"&#39;")})">Discuss ↗</button>
      </div>
    </div>`;
}

function buildActionChecklist(tier, hosts, rd, type, note) {
  if (tier === 'dismiss') return `
    <div class="action-box dismiss-box">
      <div class="action-title" style="color:var(--text-sec)">Dismissed -- no misuse</div>
      ${hosts.map(h=>`
        <div class="action-host">${h}</div>
        <div class="action-item pending">○ Create Salesforce case with Dismissed status (pending write access)</div>
        ${note ? `<div class="action-item pending">○ Add note: "${note.slice(0,80)}${note.length>80?'...':''}" (pending write access)</div>` : ''}`).join('')}
    </div>`;
  if (tier === 'program_team') return `
    <div class="action-box program">
      <div class="action-title" style="color:var(--green)">Referred to program team</div>
      ${hosts.map(h=>`
        <div class="action-host">${h}</div>
        <div class="action-item pending">○ Create Salesforce case -- Program Team Referral (pending write access)</div>
        <div class="action-item ready">✓ Create Gmail draft to program team (active)</div>
        ${note ? `<div class="action-item pending">○ Add note (pending write access)</div>` : ''}`).join('')}
    </div>`;

  const items = [
    {label:'Create Salesforce case linked to Contact', ready:false},
    {label:'Set Flag__c = true on Contact', ready:false},
    {label:`Set Flag_Reason__c = "See case from ${rd}"`, ready:false},
    {label:'Create Gmail draft with consequence email', ready:true},
  ];
  if (note) items.push({label:`Add note: "${note.slice(0,80)}${note.length>80?'...':''}"`, ready:false});
  if (['nourishment_pause','suspension','deactivation'].includes(tier)) {
    items.push({label:'Set Do_Not_Nourish__c = true', ready:false});
    items.push({label:'Move future dinners to Not Nourishing', ready:false});
  }
  if (['suspension','deactivation'].includes(tier)) {
    items.push({label:'Set Suspended_Flag__c = true', ready:false});
    items.push({label:'Set Grant Application status = "Suspended"', ready:false});
  }
  if (tier === 'deactivation') {
    items.push({label:'Alert Amalia', ready:true});
    items.push({label:'Create Zendesk ticket for IP/account ban', ready:false});
  }
  items.push({label:'Manual: check DNN in backend', ready:false});
  if (['suspension','deactivation'].includes(tier)) items.push({label:'Manual: check Banned in backend', ready:false});

  return `
    <div class="action-box ts">
      <div class="action-title" style="color:var(--wine)">Actions queued:</div>
      ${hosts.map(h=>`
        <div class="action-host">${h}</div>
        ${items.map(i=>`<div class="action-item ${i.ready?'ready':'pending'}">${i.ready?'✓':'○'} ${i.label}${i.ready?' (active)':' (pending write access)'}</div>`).join('')}`).join('')}
    </div>`;
}

// ── flag card ─────────────────────────────────────────────────────────────

    <div class="case-card" id="card-${f.id}">

              ${actioned ? '✓ Done' : isProgram ? 'Route to program team' : 'Flag for review'}
            </button>

// ── slack ──────────────────────────────────────────────────────────────────
function buildSlack(allActioned) {

  const draft = [
    `*Trust and Safety · Week of ${sl.week_of||runDate()}*`,

// ── events ─────────────────────────────────────────────────────────────────
function attachEvents() {
  // auto-scroll chat
  const cm = document.getElementById('chat-messages');
  if (cm) cm.scrollTop = cm.scrollHeight;
}

function switchView(v) { state.view = v; render(); }
function setFilter(f) { state.filter = f; render(); }

function toggleCard(id) {
  if (!state.openCards) state.openCards = new Set();
  if (state.openCards.has(id)) state.openCards.delete(id);
  else state.openCards.add(id);
  render();
}

function toggleCollapsible(el) {
  const body = el.nextElementSibling;
  const chevron = el.querySelector('.chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  if (chevron) chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
}

function toggleOverride(id) {
  state.overrideOpen = state.overrideOpen === id ? null : id;
  render();
}

function approveCase(id, tier, isCluster) {
  if (isCluster && state.clusterWarning !== id) { state.clusterWarning = id; render(); return; }
  state.actionState[id] = { ...state.actionState[id], tier };
  state.clusterWarning = null;
  state.overrideOpen = null;
  render();
}

function confirmCluster(id) {
  const tier = (state.current.cases||[]).find(c=>c.id===id)?.tier || 'suspension';
  state.actionState[id] = { ...state.actionState[id], tier };
  state.clusterWarning = null;
  render();
}
function cancelCluster() { state.clusterWarning = null; render(); }

function confirmOverride(id) {
  const tierEl = document.getElementById(`override-tier-${id}`);
  const reasonEl = document.getElementById(`override-reason-${id}`);
  if (!tierEl?.value) return;
  state.actionState[id] = { ...state.actionState[id], tier: tierEl.value, reason: reasonEl?.value };
  state.overrideOpen = null;
  render();
}

function actionFlag(id, type) {
  state.actionState[id] = { tier: type };
  render();
}

function saveNote(id, val) {
  state.actionState[id] = { ...state.actionState[id], note: val };
  // Save runs with notes
  if (state.current) {
    const idx = state.runs.findIndex(r => r.id === state.current.id);
    if (idx >= 0) { state.runs[idx]._actionState = state.actionState; saveRuns(state.runs); }
  }
}

function sendSlack() {
  const btn = document.getElementById('slack-send-btn');
  if (btn) { btn.textContent = '✓ Sent to Slack'; btn.disabled = true; }
}

function loadRun(idx) {
  state.current = state.runs[idx];
  state.actionState = state.current._actionState || {};
  state.openCards = new Set();
  state.filter = 'all';
  state.view = 'review';
  render();
}

// ── load from file ─────────────────────────────────────────────────────────
async function autoLoad() {
  const statusEl = document.getElementById('load-status');
  if (statusEl) statusEl.innerHTML = '<div class="load-status" style="background:var(--khaki-light)">Loading ts_ui_data.json...</div>';
  const data = await tryLoadFromFile();
  if (!data) {
    if (statusEl) statusEl.innerHTML = '<div class="load-status error">Could not load ts_ui_data.json. Make sure the file is in the same folder as this HTML file and Claude Code has run the review.</div>';
    return;
  }
  loadData(data);
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      loadData(data);
    } catch {
      const statusEl = document.getElementById('load-status');
      if (statusEl) statusEl.innerHTML = '<div class="load-status error">Could not parse JSON file.</div>';
    }
  };
  reader.readAsText(file);
}

function loadData(data) {
  const run = { ...data, id: Date.now(), loadedAt: new Date().toISOString() };
  state.runs = [run, ...state.runs].slice(0, 24);
  saveRuns(state.runs);
  state.current = run;
  state.actionState = {};
  state.openCards = new Set();
  state.filter = 'all';
  state.view = 'review';
  render();
}

// ── chat ───────────────────────────────────────────────────────────────────
const CHAT_SYSTEM = `You are the OneTable Trust and Safety case advisor. You help staff review individual host cases flagged during the weekly T&S review. You know the full signal definitions, scoring rules, consequence framework, and policy.

Key rules:
- Warning: 1-8 | Nourishment Pause: 9-17 | Suspension: 18-39 | Deactivation: 40+
- First instance rule: even at 40+, first consequence is Suspension
- Every signal requires pairing except: Signal 1 (shared host/guest FP), Signal 12 (hard bounces), Signals 21-23
- Sequential PIDs: gap ≤ 2, denominator = ALL guests
- Tier determined by score only -- never override based on narrative

Answer questions directly and concisely. You can draft outreach emails, explain signal math, suggest Salesforce checks, or discuss edge cases. Stay grounded in the data provided.`;

function openChat(c) {
  state.activeChat = c;
  state.chatMessages = [{
    role: 'assistant',
    content: `I'm looking at the **${c.name||c.title}** case${c.score?' (score '+c.score+' → '+(tierLabel(c.tier))+')':''}. What would you like to know?`
  }];
  state.chatInput = '';
  render();
}

function closeChat() { state.activeChat = null; state.chatMessages = []; render(); }
function setChat(q) {
  const input = document.getElementById('chat-input');
  if (input) { input.value = q; state.chatInput = q; }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input?.value?.trim();
  if (!msg || state.chatLoading) return;

  const c = state.activeChat;
  const caseCtx = `Case data:
Host: ${c.name||c.title}
Tier: ${c.tier||''} | Score: ${c.score||''}
Nourishment: ${c.nourishment_received||''}
Suspended: ${c.suspended} | DNN: ${c.dnn}
Score breakdown: ${c.score_breakdown||''}
Signals triggered: ${(c.signals||[]).filter(s=>s.triggered).map(s=>`${s.name} (${s.observed||''}, +${s.score_contribution})`).join('; ')}
Host context: ${JSON.stringify(c.host_context||{})}
Summary: ${(c.bullets||[]).join(' | ')}`;

  state.chatMessages = [...(state.chatMessages||[]), {role:'user', content:msg}];
  state.chatLoading = true;
  state.chatInput = '';
  render();

  try {
    const history = (state.chatMessages||[]).slice(0,-1).map(m=>({role:m.role, content:m.content}));
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: CHAT_SYSTEM + '\n\n' + caseCtx,
        messages: [...history, {role:'user', content:msg}],
      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    state.chatMessages = [...state.chatMessages, {role:'assistant', content:text}];
  } catch {
    state.chatMessages = [...state.chatMessages, {role:'assistant', content:'Error connecting. Try again.'}];
  }
  state.chatLoading = false;
  render();
}

// ── boot ───────────────────────────────────────────────────────────────────
// On load, try to auto-load ts_ui_data.json
(async () => {
  render();
  // Try auto-loading after a tick
  setTimeout(async () => {
    const data = await tryLoadFromFile();
    if (data) loadData(data);
  }, 100);
})();
</script>
</body>
